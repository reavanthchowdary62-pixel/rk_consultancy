<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />
  
  <!-- Sleek shield/emblem icon in background -->
  <path d="M256 90 L390 140 L390 280 C390 380 256 440 256 440 C256 440 122 380 122 280 L122 140 Z" fill="url(#goldGrad)" opacity="0.9" filter="url(#glow)"/>
  <path d="M256 102 L375 148 L375 275 C375 363 256 418 256 418 C256 418 137 363 137 275 L137 148 Z" fill="#0f172a" opacity="0.8"/>
  
  <!-- RK Text -->
  <text x="256" y="290" font-family="'Inter', -apple-system, sans-serif" font-weight="900" font-size="160" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2" filter="url(#glow)">RK</text>
  
  <!-- Academic swoosh/underline -->
  <path d="M 180 370 Q 256 390 332 370" fill="none" stroke="#60a5fa" stroke-width="14" stroke-linecap="round"/>
</svg>
